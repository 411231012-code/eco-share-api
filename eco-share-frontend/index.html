<!DOCTYPE html>
<html>
<head>

<title>Eco Share Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<div class="container">

<div class="box">

<h2>
🌱 Eco Share
</h2>

<p>Login</p>


<form id="loginForm">


<input 
class="form-control mb-3"
id="email"
type="email"
placeholder="Email"
required>


<input 
class="form-control mb-3"
id="password"
type="password"
placeholder="Password"
required>


<button class="btn btn-success w-100">
Login
</button>


</form>


<p class="mt-3">

Belum punya akun?

<a href="register.html">
Register
</a>

</p>


</div>

</div>


<script src="js/auth.js"></script>

</body>
</html>
