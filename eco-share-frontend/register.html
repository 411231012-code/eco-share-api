<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eco Share - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">

<div class="login-box">


<h2 class="text-center mb-4">
🌱 Eco Share
</h2>


<p class="text-center text-muted">
Buat akun baru
</p>



<form id="registerForm">


<div class="mb-3">

<label class="form-label">
Nama
</label>

<input 
type="text"
id="name"
class="form-control"
placeholder="Nama lengkap"
required>

</div>



<div class="mb-3">

<label class="form-label">
Email
</label>

<input 
type="email"
id="email"
class="form-control"
placeholder="Email"
required>

</div>



<div class="mb-3">

<label class="form-label">
Password
</label>

<input 
type="password"
id="password"
class="form-control"
placeholder="Password"
required>

</div>



<button class="btn btn-success w-100">
Register
</button>


</form>


<p class="text-center mt-3">

Sudah punya akun?

<a href="index.html">
Login
</a>

</p>



</div>

</div>


<script src="js/auth.js"></script>


</body>

</html>
